<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Script Tool</title>
    <link rel="stylesheet" href="sidepanel.css" />
  </head>
  <body>
    <!-- ROW 1: Top Bar -->
    <header class="top-bar" id="top-bar">
      <select id="mode-select" class="bar-control">
        <option value="usage">Usage Mode</option>
        <option value="editor">Template Editor</option>
      </select>

      <select id="template-select" class="bar-control">
        <option>Loading templates…</option>
      </select>

      <button class="bar-icon" title="Settings">⚙</button>
    </header>

    <!-- VIEW: Hub -->
    <div
      id="view-hub"
      style="display: none; flex-direction: column; flex: 1; overflow: hidden"
    >
      <!-- Dark App Header -->
      <div class="app-header">
        <div class="app-header__logo">
          <span class="app-header__plus">+</span>
        </div>
        <span class="app-header__title">Advanced Therapeutics</span>
        <button class="app-header__burger" id="btn-burger" title="Menu">
          &#9776;
        </button>
      </div>

      <!-- Search + Sort Row -->
      <div class="hub-search-row">
        <div class="hub-search-wrap">
          <span class="hub-search-icon">&#128269;</span>
          <input
            id="patient-search"
            class="hub-search-input"
            type="text"
            placeholder="Search patients..."
            autocomplete="off"
          />
        </div>
        <select id="patient-sort" class="hub-sort-select">
          <option value="recent">Sort &#9662;</option>
          <option value="alpha">A–Z</option>
        </select>
      </div>

      <!-- Full-width New Patient Button -->
      <div class="hub-new-patient-row">
        <button id="btn-new-patient" class="btn btn--primary hub-new-btn">
          + New Patient
        </button>
      </div>

      <!-- Inline new patient form (hidden until + button clicked) -->
      <div id="new-patient-form" class="new-patient-form" style="display: none">
        <input
          id="new-patient-name"
          class="patient-input"
          type="text"
          placeholder="Full name — e.g. John Smith"
          autocomplete="off"
        />
        <button id="btn-confirm-patient" class="btn btn--primary">
          Confirm
        </button>
        <button id="btn-cancel-patient" class="btn btn--secondary">
          Cancel
        </button>
      </div>

      <!-- Patient list -->
      <div id="patient-list" class="patient-list"></div>
    </div>

    <!-- Burger Menu Overlay -->
    <div id="burger-overlay" class="burger-overlay" style="display: none">
      <div class="burger-overlay__header">
        <button id="btn-burger-close" class="burger-overlay__back">
          &#8249;
        </button>
        <span class="burger-overlay__title">Settings</span>
      </div>
      <div class="burger-overlay__body">
        <div class="burger-setting-row">
          <label class="burger-setting-label">Your Name</label>
          <input
            id="user-name-input"
            class="patient-input"
            type="text"
            placeholder="e.g. Adam"
            autocomplete="off"
          />
          <button id="btn-save-user-name" class="btn btn--primary">Save</button>
        </div>
        <div class="burger-nav-row" id="btn-open-editor">
          <span>Template Editor</span>
          <span>&#8250;</span>
        </div>
      </div>
    </div>

    <!-- VIEW: Folder -->
    <div
      id="view-folder"
      style="display: none; flex-direction: column; flex: 1; overflow: hidden"
    >
      <!-- Dark header (back navigates to Hub) -->
      <div class="app-header">
        <button
          id="btn-folder-back"
          class="app-header__back"
          title="Back"
          type="button"
        >
          &#8249;
        </button>
        <span id="folder-patient-name" class="app-header__title">Patient Name</span>
      </div>

      <div id="patient-confirm-strip" class="confirm-strip"></div>

      <!-- Patient Info Card (pinned above script list) -->
      <div id="patient-info-card" class="patient-info-card"></div>

      <!-- Full-width New Script Button -->
      <div class="folder-new-script-row">
        <button id="btn-new-script" class="btn btn--primary folder-new-script-btn">
          + New Script
        </button>
      </div>

      <!-- Session list -->
      <div id="session-list" class="session-list">
        <!-- Injected by JS -->
      </div>
    </div>

    <!-- VIEW: Workspace -->
    <div
      id="view-workspace"
      style="display: none; flex-direction: column; flex: 1; overflow: hidden"
    >
      <!-- Dark header (back navigates to Folder) -->
      <div class="app-header">
        <button
          id="btn-workspace-back"
          class="app-header__back"
          title="Back"
          type="button"
        >
          &#8249;
        </button>
        <span id="workspace-patient-name" class="app-header__title">Patient</span>
      </div>

      <!-- ROW 2: Patient Name — this creates the session -->
      <div class="patient-row">
        <label class="patient-label" for="patient-name-input"
          >Patient Full Name</label
        >
        <input
          id="patient-name-input"
          class="patient-input"
          type="text"
          placeholder="e.g. John Smith"
          autocomplete="off"
        />
      </div>

      <!-- ROW 2.5: Session status (shown once a patient name is entered) -->
      <div class="session-bar" id="session-bar" style="display: none">
        <span class="session-bar__label">Session:</span>
        <span class="session-bar__id" id="session-id-display">—</span>
      </div>

      <!-- ROW 3: Pill Grid — fills in per template -->
      <div class="pill-grid" id="pill-grid"></div>

      <!-- ROW 4: Script Canvas — the main reading area -->
      <div class="canvas-wrapper">
        <div
          id="script-canvas"
          class="canvas-area"
          contenteditable="true"
          spellcheck="false"
        ></div>
      </div>

      <footer class="footer">
        <button
          id="btn-delete-session"
          class="btn btn--danger"
          style="display: none"
        >
          🗑 Delete Session
        </button>
        <div style="display: flex; gap: 6px">
          <button id="btn-save" class="btn btn--secondary">Save Session</button>
          <button
            id="btn-save-template"
            class="btn btn--primary"
            style="display: none"
          >
            💾 Save Template
          </button>
          <button
            id="btn-reset-default"
            class="btn btn--secondary"
            style="display: none"
          >
            ↩ Reset to Default
          </button>
          <button
            id="btn-delete-template"
            class="btn btn--danger"
            style="display: none"
          >
            🗑 Delete Template
          </button>
          <button id="btn-download" class="btn btn--primary">
            ⬇ Download .rtf
          </button>
        </div>
      </footer>
    </div>

    <div class="status-footer">
      ℹ️ All data is stored locally on this device.
    </div>

    <!-- ROW 5: Footer -->
    <div id="template-confirm-strip" class="confirm-strip"></div>
    <div id="session-confirm-strip" class="confirm-strip"></div>

    <script type="module" src="sidepanel.js"></script>
  </body>
</html>
